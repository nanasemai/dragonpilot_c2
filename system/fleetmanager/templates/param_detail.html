{% extends "layout.html" %}

{% block title %}
    参数编辑 - {{ param_name }}
{% endblock %}

{% block main %}
    <br>
    <h1>编辑参数: {{ param_name }}</h1>
    <div class="alert alert-info">
        <strong>参数说明:</strong> {{ param_description }}
    </div>
    <br>
    <form method="POST" onsubmit="return validateParam()">
        <div class="form-group">
            <textarea class="form-control" name="value" rows="10">{{ param_value }}</textarea>
            <small id="paramHelp" class="form-text text-muted"></small>
        </div>
        <br>
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="/params" class="btn btn-secondary">取消</a>
    </form>

    <script>
    function validateParam() {
        const paramName = "{{ param_name }}";
        const value = document.querySelector('textarea[name="value"]').value;
        
        // 简单前端验证示例
        if(paramName === "dp_log_level" && !/^[0-4]$/.test(value)) {
            alert("日志级别必须是0-4之间的数字");
            return false;
        }
        return true;
    }
    </script>
{% endblock %}
